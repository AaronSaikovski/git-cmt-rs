name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: git-cmt-rs

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-x86_64-musl
          # Native ARM64 Linux runner (free for public repos, GA early 2025).
          # If unavailable, swap to ubuntu-latest + cross-compile.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            platform: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (release)
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare package
        shell: bash
        run: |
          set -eu
          VER="${GITHUB_REF_NAME}"                    # e.g., v1.2.3
          NAME="${{ env.BIN_NAME }}-${VER}-${{ matrix.platform }}"
          DIST="dist"
          mkdir -p "${DIST}"

          BIN="target/${{ matrix.target }}/release/${{ env.BIN_NAME }}"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            BIN="${BIN}.exe"
          fi

          STAGE="${DIST}/${NAME}"
          mkdir -p "${STAGE}"
          cp "${BIN}" "${STAGE}/"
          [ -f LICENSE ] && cp LICENSE "${STAGE}/" || true
          [ -f README.md ] && cp README.md "${STAGE}/" || true

          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "${DIST}/${NAME}.zip" "./${STAGE}/*"
            certutil -hashfile "${DIST}/${NAME}.zip" SHA256 | sed -n '2p' > "${DIST}/${NAME}.zip.sha256"
          else
            tar -C "${DIST}" -czf "${DIST}/${NAME}.tar.gz" "${NAME}"
            shasum -a 256 "${DIST}/${NAME}.tar.gz" | awk '{print $1}' > "${DIST}/${NAME}.tar.gz.sha256"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: List downloaded files
        run: ls -lah

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            *.tar.gz
            *.tar.gz.sha256
            *.zip
            *.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
